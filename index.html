<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your IP Information</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-image: url('OIP.jpeg'); /* Make sure this file exists in the same folder as your HTML file */
            background-size: cover;
            background-position: center;
            color: white;
        }
        .container {
            background-color: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
            text-align: left;
            max-width: 600px;
            width: 100%;
        }
        h1 {
            margin-top: 0;
            text-align: center;
        }
        #ip-info {
            white-space: pre-line;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1></h1>
        <div id="ip-info">Loading...</div>
    </div>

    <script>
        async function fetchIPInfo() {
            try {
                const response = await fetch('https://ipapi.co/json/');
                const data = await response.json();
                return `IP Address: ${data.ip}
Country: ${data.country_name}
Region: ${data.region}
City: ${data.city}
ZIP Code: ${data.postal}
Latitude: ${data.latitude}
Longitude: ${data.longitude}
Timezone: ${data.timezone}
ISP: ${data.org}`;
            } catch (error) {
                console.error('Error fetching IP info:', error);
                return 'Unable to fetch IP information';
            }
        }

        function typeWriter(text, element, speed = 50) {
            let i = 0;
            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                } else {
                    setTimeout(startTyping, 2000); // Restart after 2 seconds
                }
            }
            type();
        }

        async function startTyping() {
            const ipInfo = await fetchIPInfo();
            const infoElement = document.getElementById('ip-info');
            infoElement.innerHTML = '';
            typeWriter(ipInfo, infoElement);
        }

        startTyping();
    </script>
</body>
</html>
