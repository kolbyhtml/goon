<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>king von twerk comp</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-image: url('OIP.jpeg'); /* Make sure this file exists in the same folder as your HTML file */
            background-size: cover;
            background-position: center;
            color: white;
        }
        .container {
            background-color: rgba(0, 0, 0, 0.7);
            padding: 20px;
            border-radius: 10px;
            text-align: left;
            max-width: 600px;
            width: 100%;
        }
        h1 {
            margin-top: 0;
            text-align: center;
        }
        #ip-info {
            white-space: pre-line;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1></h1>
        <div id="ip-info">Loading...</div>
    </div>

    <script>
        async function fetchIPInfo() {
            try {
                const ipinfoResponse = await fetch('https://ipinfo.io/json?token=a6640fef2c0242');
                const ipinfoData = await ipinfoResponse.json();

                const ipapiResponse = await fetch('https://ipapi.co/json/');
                const ipapiData = await ipapiResponse.json();

                const screenWidth = screen.width;
                const screenHeight = screen.height;
                const browserInfo = navigator.userAgent;

                return `IP Address: ${ipapiData.ip}
Country: ${ipapiData.country_name}
Region: ${ipapiData.region}
City: ${ipapiData.city}
Postal Code: ${ipapiData.postal}
Latitude: ${ipapiData.latitude}
Longitude: ${ipapiData.longitude}
Timezone: ${ipapiData.timezone}
ISP: ${ipapiData.org}
Currency: ${ipapiData.currency_name}
Screen Width: ${screenWidth} pixels
Screen Height: ${screenHeight} pixels
Browser: ${browserInfo}`;
            } catch (error) {
                console.error('Error fetching IP info:', error);
                return 'Unable to fetch IP information';
            }
        }

        function typeWriter(text, element, speed = 40) {
            let i = 0;
            function type() {
                if (i < text.length) {
                    element.innerHTML += text.charAt(i);
                    i++;
                    setTimeout(type, speed);
                } else {
                    setTimeout(startTyping, 6000); // Restart after 2 seconds
                }
            }
            type();
        }

        async function startTyping() {
            const ipInfo = await fetchIPInfo();
            const infoElement = document.getElementById('ip-info');
            infoElement.innerHTML = '';
            typeWriter(ipInfo, infoElement);
        }

        startTyping();
    </script>
</body>
</html>
